name: Build desktop apps

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build-macos:
    name: macOS
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_backend

      - name: Build Rust backend (macOS dylib)
        run: cargo build --release
        working-directory: rust_backend

      - name: Copy dylib into macOS runner bundle
        run: |
          mkdir -p macos/Runner
          cp rust_backend/target/release/librust_sleep_eeg.dylib macos/Runner/

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS app
        run: flutter build macos --release

      - name: Ad-hoc sign macOS app
        run: codesign --force --deep --sign - build/macos/Build/Products/Release/ScoringNidra.app

      - name: Package macOS app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/ScoringNidra.app \
            dist/ScoringNidra-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScoringNidra-macos
          path: dist/ScoringNidra-macos.zip
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_backend

      - name: Build Rust backend (Windows DLL)
        run: cargo build --release
        working-directory: rust_backend

      - name: Copy DLL into Windows runner
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows\runner
          Copy-Item rust_backend\target\release\rust_sleep_eeg.dll windows\runner\

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app (Inno Setup Installer)
        run: iscc windows/installer.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScoringNidra-Installer
          path: dist/ScoringNidra-Installer.exe
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release Assets
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ScoringNidra-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ScoringNidra-Installer
          path: dist

      - name: Generate Release Tag & Name
        id: release_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "title=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "title=Latest Development Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.title }}
          prerelease: ${{ steps.release_info.outputs.prerelease == 'true' }}
          files: |
            dist/ScoringNidra-macos.zip
            dist/ScoringNidra-Installer.exe
          draft: false
          make_latest: ${{ steps.release_info.outputs.tag != 'latest' && 'true' || 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
