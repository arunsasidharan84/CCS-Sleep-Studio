name: Build desktop apps

# Push builds are intentionally opt-in because this workflow creates full
# desktop installers and releases. Include "[build desktop]" in any pushed
# commit message to run it from a branch push.
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: Optional note for this manual desktop build
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS
    runs-on: macos-15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(toJSON(github.event.commits), '[build desktop]')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt
          pip check
          # usleep-api 0.1.3 pins requests==2.25.1, while PhysioEx/psg-utils
          # requires requests>=2.27.1. Its client works with current requests.
          pip install --no-deps usleep-api==0.1.3
          pip install pyinstaller

      - name: Build Python standalone backend
        run: |
          pyinstaller --onedir --name autoscore-backend \
            --collect-all gssc \
            --collect-all mne \
            --collect-all yasa \
            --collect-all lspopt \
            --collect-all lightgbm \
            --collect-all physioex \
            --collect-all braindecode \
            --collect-all mne_bids \
            --collect-all lightning_fabric \
            --collect-all lunapi \
            --collect-all safetensors \
            --collect-all transformers \
            --collect-all usleep_api \
            --add-data "backend/vendor/physioex/train/models/checkpoints:physioex/train/models/checkpoints" \
            --add-data "backend/models:backend/models" \
            --add-data "backend/sleepgpt-main:sleepgpt-main" \
            backend_entry.py

      - name: Validate AutoscoreNidra standalone backend
        run: |
          chmod +x dist/autoscore-backend/autoscore-backend
          dist/autoscore-backend/autoscore-backend --check-models

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bridge
            analyseNidra

      - name: Build Rust backend (macOS dylib)
        run: cargo build --release
        working-directory: bridge

      - name: Build AnalyseNidra CLI (macOS)
        run: cargo build --release
        working-directory: analyseNidra

      - name: Copy dylib into macOS runner bundle
        run: |
          mkdir -p frontend/macos/Runner
          cp bridge/target/release/librust_sleep_eeg.dylib frontend/macos/Runner/

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('frontend/pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Analyze
        run: flutter analyze
        working-directory: frontend

      - name: Test
        run: flutter test
        working-directory: frontend

      # 1. Build and Package Lite version
      - name: Build macOS app (Lite)
        run: flutter build macos --release --dart-define=LITE_BUILD=true
        working-directory: frontend

      - name: Copy AnalyseNidra into macOS App bundle (Lite)
        run: |
          cp analyseNidra/target/release/analyse-nidra "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/"
          test -x "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/analyse-nidra"

      - name: Ad-hoc sign macOS app (Lite)
        run: codesign --force --deep --sign - "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app"

      - name: Package macOS app (Lite)
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app" \
            dist/CCSSleepStudio-lite-macos.zip

      # 2. Build and Package Full version
      - name: Build macOS app (Full)
        run: flutter build macos --release
        working-directory: frontend

      - name: Copy Python backend into macOS App bundle (Full)
        run: |
          cp -R dist/autoscore-backend "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/"
          test -x "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/autoscore-backend/autoscore-backend"

      - name: Copy AnalyseNidra into macOS App bundle (Full)
        run: |
          cp analyseNidra/target/release/analyse-nidra "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/"
          test -x "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app/Contents/Resources/analyse-nidra"

      - name: Ad-hoc sign macOS app (Full)
        run: codesign --force --deep --sign - "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app"

      - name: Package macOS app (Full)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "frontend/build/macos/Build/Products/Release/CCS Sleep Studio.app" \
            dist/CCSSleepStudio-macos.zip

      # 3. Upload Artifacts
      - name: Upload macOS Full artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-macos
          path: dist/CCSSleepStudio-macos.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload macOS Lite artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-lite-macos
          path: dist/CCSSleepStudio-lite-macos.zip
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Windows
    runs-on: windows-2022
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(toJSON(github.event.commits), '[build desktop]')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt
          pip check
          # usleep-api 0.1.3 has an obsolete requests==2.25.1 dependency pin.
          pip install --no-deps usleep-api==0.1.3
          pip install pyinstaller

      - name: Build Python standalone backend
        shell: pwsh
        run: |
          pyinstaller --onedir --name autoscore-backend `
            --collect-all gssc `
            --collect-all mne `
            --collect-all yasa `
            --collect-all lspopt `
            --collect-all lightgbm `
            --collect-all physioex `
            --collect-all braindecode `
            --collect-all mne_bids `
            --collect-all lightning_fabric `
            --collect-all lunapi `
            --collect-all safetensors `
            --collect-all transformers `
            --collect-all usleep_api `
            --add-data "backend/vendor/physioex/train/models/checkpoints;physioex/train/models/checkpoints" `
            --add-data "backend/models;backend/models" `
            --add-data "backend/sleepgpt-main;sleepgpt-main" `
            backend_entry.py

      - name: Validate AutoscoreNidra standalone backend
        shell: pwsh
        run: dist\autoscore-backend\autoscore-backend.exe --check-models

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bridge
            analyseNidra

      - name: Build Rust backend (Windows DLL)
        run: cargo build --release
        working-directory: bridge

      - name: Build AnalyseNidra CLI (Windows)
        run: cargo build --release
        working-directory: analyseNidra

      - name: Copy DLL into Windows runner
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path frontend\windows\runner
          Copy-Item bridge\target\release\rust_sleep_eeg.dll frontend\windows\runner\

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('frontend/pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Analyze
        run: flutter analyze
        working-directory: frontend

      - name: Test
        run: flutter test
        working-directory: frontend

      # 1. Build and Package Lite version
      - name: Build Windows app (Lite)
        run: flutter build windows --release --dart-define=LITE_BUILD=true
        working-directory: frontend

      - name: Copy AnalyseNidra into Windows runner build output (Lite)
        shell: pwsh
        run: |
          Copy-Item analyseNidra\target\release\analyse-nidra.exe frontend\build\windows\x64\runner\Release\
          if (-not (Test-Path frontend\build\windows\x64\runner\Release\analyse-nidra.exe)) { exit 1 }

      - name: Package Windows app (Lite Installer)
        run: iscc /F"CCSSleepStudio-lite-Installer" frontend/windows/installer-lite.iss

      # 2. Build and Package Full version
      - name: Build Windows app (Full)
        run: flutter build windows --release
        working-directory: frontend

      - name: Copy Python backend into Windows runner build output (Full)
        shell: pwsh
        run: |
          Copy-Item -Recurse dist\autoscore-backend frontend\build\windows\x64\runner\Release\
          if (-not (Test-Path frontend\build\windows\x64\runner\Release\autoscore-backend\autoscore-backend.exe)) { exit 1 }

      - name: Copy AnalyseNidra into Windows runner build output (Full)
        shell: pwsh
        run: |
          Copy-Item analyseNidra\target\release\analyse-nidra.exe frontend\build\windows\x64\runner\Release\
          if (-not (Test-Path frontend\build\windows\x64\runner\Release\analyse-nidra.exe)) { exit 1 }

      - name: Package Windows app (Full Installer)
        run: iscc /F"CCSSleepStudio-Installer" frontend/windows/installer.iss

      # 3. Upload Artifacts
      - name: Upload Windows Full installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-Installer
          path: frontend/dist/CCSSleepStudio-Installer.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload Windows Lite installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-lite-Installer
          path: frontend/dist/CCSSleepStudio-lite-Installer.exe
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(toJSON(github.event.commits), '[build desktop]')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libblkid-dev dpkg-dev rpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt
          pip check
          # usleep-api 0.1.3 pins requests==2.25.1, while PhysioEx/psg-utils
          # requires requests>=2.27.1. Its client works with current requests.
          pip install --no-deps usleep-api==0.1.3
          pip install pyinstaller

      - name: Build Python standalone backend
        run: |
          pyinstaller --onedir --name autoscore-backend \
            --collect-all gssc \
            --collect-all mne \
            --collect-all yasa \
            --collect-all lspopt \
            --collect-all lightgbm \
            --collect-all physioex \
            --collect-all braindecode \
            --collect-all mne_bids \
            --collect-all lightning_fabric \
            --collect-all lunapi \
            --collect-all safetensors \
            --collect-all transformers \
            --collect-all usleep_api \
            --add-data "backend/vendor/physioex/train/models/checkpoints:physioex/train/models/checkpoints" \
            --add-data "backend/models:backend/models" \
            --add-data "backend/sleepgpt-main:sleepgpt-main" \
            backend_entry.py

      - name: Validate AutoscoreNidra standalone backend
        run: |
          chmod +x dist/autoscore-backend/autoscore-backend
          dist/autoscore-backend/autoscore-backend --check-models

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bridge
            analyseNidra

      - name: Build Rust backend (Linux so)
        run: cargo build --release
        working-directory: bridge

      - name: Build AnalyseNidra CLI (Linux)
        run: cargo build --release
        working-directory: analyseNidra

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('frontend/pubspec.yaml') }}

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Analyze
        run: flutter analyze
        working-directory: frontend

      - name: Test
        run: flutter test
        working-directory: frontend

      # 1. Build and Package Lite version
      - name: Build Linux app (Lite)
        run: flutter build linux --release --dart-define=LITE_BUILD=true
        working-directory: frontend

      - name: Copy Rust backend into Linux bundle (Lite)
        run: |
          cp bridge/target/release/librust_sleep_eeg.so frontend/build/linux/x64/release/bundle/
          cp analyseNidra/target/release/analyse-nidra frontend/build/linux/x64/release/bundle/
          test -x frontend/build/linux/x64/release/bundle/analyse-nidra

      - name: Build Linux installer (Lite)
        run: |
          bash scripts/package_linux_deb.sh \
            frontend/build/linux/x64/release/bundle \
            dist/CCSSleepStudio-lite-linux-amd64.deb \
            lite
          bash scripts/package_linux_rpm.sh \
            frontend/build/linux/x64/release/bundle \
            dist/CCSSleepStudio-lite-linux-x86_64.rpm \
            lite

      # 2. Build and Package Full version
      - name: Build Linux app (Full)
        run: flutter build linux --release
        working-directory: frontend

      - name: Copy Python and Rust backend into Linux bundle (Full)
        run: |
          cp -a dist/autoscore-backend frontend/build/linux/x64/release/bundle/
          cp bridge/target/release/librust_sleep_eeg.so frontend/build/linux/x64/release/bundle/
          cp analyseNidra/target/release/analyse-nidra frontend/build/linux/x64/release/bundle/
          test -x frontend/build/linux/x64/release/bundle/analyse-nidra

      - name: Build Linux installer (Full)
        run: |
          bash scripts/package_linux_deb.sh \
            frontend/build/linux/x64/release/bundle \
            dist/CCSSleepStudio-linux-amd64.deb \
            full
          bash scripts/package_linux_rpm.sh \
            frontend/build/linux/x64/release/bundle \
            dist/CCSSleepStudio-linux-x86_64.rpm \
            full

      - name: Validate RPM installers on AlmaLinux 9
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/packages:ro" \
            almalinux:9 bash -lc '
              dnf install -y /packages/CCSSleepStudio-lite-linux-x86_64.rpm &&
              test -x /usr/bin/ccs-sleep-studio &&
              test -f /usr/share/applications/ccs-sleep-studio.desktop &&
              ldd /usr/lib/ccs-sleep-studio/CCSSleepStudio > /tmp/ldd.txt &&
              ! grep -E "not found|version .* not found" /tmp/ldd.txt
            '
          docker run --rm \
            -v "${{ github.workspace }}/dist:/packages:ro" \
            almalinux:9 bash -lc '
              dnf install -y /packages/CCSSleepStudio-linux-x86_64.rpm &&
              test -x /usr/bin/ccs-sleep-studio &&
              test -x /usr/lib/ccs-sleep-studio/autoscore-backend/autoscore-backend &&
              test -x /usr/lib/ccs-sleep-studio/analyse-nidra &&
              ldd /usr/lib/ccs-sleep-studio/CCSSleepStudio > /tmp/app-ldd.txt &&
              ldd /usr/lib/ccs-sleep-studio/autoscore-backend/autoscore-backend > /tmp/backend-ldd.txt &&
              ! grep -E "not found|version .* not found" /tmp/app-ldd.txt /tmp/backend-ldd.txt
            '

      # 3. Upload Artifacts
      - name: Upload Linux Full artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-linux-installers
          path: |
            dist/CCSSleepStudio-linux-amd64.deb
            dist/CCSSleepStudio-linux-x86_64.rpm
          if-no-files-found: error
          retention-days: 1

      - name: Upload Linux Lite artifact
        uses: actions/upload-artifact@v4
        with:
          name: CCSSleepStudio-lite-linux-installers
          path: |
            dist/CCSSleepStudio-lite-linux-amd64.deb
            dist/CCSSleepStudio-lite-linux-x86_64.rpm
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release Assets
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      (startsWith(github.ref, 'refs/tags/v') || contains(toJSON(github.event.commits), '[build desktop]'))
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-macos
          path: dist

      - name: Download macOS Lite artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-lite-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-Installer
          path: dist

      - name: Download Windows Lite artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-lite-Installer
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-linux-installers
          path: dist

      - name: Download Linux Lite artifact
        uses: actions/download-artifact@v4
        with:
          name: CCSSleepStudio-lite-linux-installers
          path: dist

      - name: Generate Release Tag & Name
        id: release_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "title=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "title=Latest Development Build" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.title }}
          prerelease: ${{ steps.release_info.outputs.prerelease == 'true' }}
          files: |
            dist/CCSSleepStudio-macos.zip
            dist/CCSSleepStudio-lite-macos.zip
            dist/CCSSleepStudio-Installer.exe
            dist/CCSSleepStudio-lite-Installer.exe
            dist/CCSSleepStudio-linux-amd64.deb
            dist/CCSSleepStudio-lite-linux-amd64.deb
            dist/CCSSleepStudio-linux-x86_64.rpm
            dist/CCSSleepStudio-lite-linux-x86_64.rpm
          draft: false
          make_latest: ${{ steps.release_info.outputs.tag != 'latest' && 'true' || 'false' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
